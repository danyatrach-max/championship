<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чемпіонат України з футболу</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#f5d020;--yellow2:#e6b800;--blue:#0057b8;--blue2:#003f8a;--blue3:#002d63;
  --bg:#08122b;--bg2:#0d1e40;--bg3:#112350;--border:rgba(255,255,255,0.09);
  --text:#eef2ff;--muted:#7a90c0;--font-d:'Bebas Neue',sans-serif;--font-b:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;padding:0 0 4rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(0,87,184,0.22) 0%,transparent 65%);pointer-events:none;z-index:0}
.container{max-width:800px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1}
.site-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:10px}
.logo-block .logo{font-family:var(--font-d);font-size:clamp(28px,7vw,52px);letter-spacing:.04em;line-height:1;color:var(--yellow);text-shadow:0 0 40px rgba(245,208,32,.25)}
.logo-block .logo span{color:var(--text)}
.logo-block p{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:8px;font-family:var(--font-b);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--yellow);color:#08122b}
.btn-primary:hover{background:#f7dc3a;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg3)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-red{background:transparent;color:#e06060;border:1px solid rgba(220,80,80,.3);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;padding:7px 14px;border-radius:8px;transition:all .15s}
.btn-red:hover{background:rgba(220,80,80,.1)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;font-family:var(--font-b)}
.tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:center;padding:6px;color:var(--muted);font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border)}
th:nth-child(2){text-align:left}
td{text-align:center;padding:8px 5px;border-bottom:1px solid var(--border);color:var(--text)}
td:nth-child(2){text-align:left}
tr:last-child td{border-bottom:none}
.pts-cell{font-weight:700;color:var(--yellow)}
.team-cell{display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px}
.team-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0;border-radius:2px}
.team-logo-sm{width:18px;height:18px;object-fit:contain;flex-shrink:0}
tr.champion td{background:rgba(245,208,32,.07)}
tr.relegate td{background:rgba(220,50,50,.06)}
tr.zone-ucl td{background:rgba(30,80,220,.10)}
tr.zone-ucl-q td{background:rgba(30,160,240,.08)}
tr.zone-uel td{background:rgba(140,20,60,.09)}
.round-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.round-title{font-family:var(--font-d);font-size:20px;letter-spacing:.04em;color:var(--yellow)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);transition:opacity .2s}
.match-row:last-child{border-bottom:none}
.match-row.future{opacity:.35}
.home-name{text-align:right;font-weight:500;font-size:13px;display:flex;align-items:center;justify-content:flex-end;gap:6px}
.away-name{text-align:left;font-weight:500;font-size:13px;display:flex;align-items:center;gap:6px}
.score-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:var(--font-d);font-size:18px;letter-spacing:.06em;min-width:66px;text-align:center}
.match-row.played .score-box{border-color:rgba(245,208,32,.2);color:var(--yellow)}
.match-row.active .score-box{border-color:var(--yellow);color:var(--text)}
.progress-wrap{margin-bottom:1rem}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--yellow);border-radius:99px;transition:width .4s ease}
.winner-banner{background:linear-gradient(135deg,rgba(245,208,32,.13),rgba(245,208,32,.04));border:1px solid rgba(245,208,32,.35);border-radius:12px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:14px;margin-bottom:1.25rem}
.winner-name{font-family:var(--font-d);font-size:30px;color:var(--yellow);letter-spacing:.04em;line-height:1}
.winner-sub{font-size:13px;color:var(--muted);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.stat-value{font-family:var(--font-d);font-size:20px;letter-spacing:.03em;color:var(--text)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}
.rounds-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:1rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.round-btn{flex-shrink:0;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-b);transition:all .15s}
.round-btn.done{color:var(--text);border-color:rgba(245,208,32,.2)}
.round-btn.current{background:var(--yellow);color:#08122b;border-color:var(--yellow);font-weight:600}
.round-btn:hover:not(.current){background:var(--bg3);color:var(--text)}
/* Offseason modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem}
.modal-title{font-family:var(--font-d);font-size:28px;color:var(--yellow);letter-spacing:.04em;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.news-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.news-body{flex:1}
.news-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.news-desc{font-size:12px;color:var(--muted)}
.rating-change{font-size:12px;font-weight:600;margin-left:6px}
.rating-up{color:#4cde7a}
.rating-down{color:#e06060}
.rating-same{color:var(--muted)}
/* Teams setup grid */
.setup-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
.team-pill-setup{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:13px;font-weight:500}
.team-pill-setup .rating-badge{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(245,208,32,.1);color:var(--yellow);font-weight:600}
/* Form indicator */
.form-dots{display:flex;gap:3px;margin-left:4px}
.form-dot{width:8px;height:8px;border-radius:50%}
/* History */
.history-season{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.history-season-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.history-season-header:hover{background:var(--bg3)}
.history-season-title{font-family:var(--font-d);font-size:18px;color:var(--yellow);letter-spacing:.04em}
.history-season-sub{font-size:12px;color:var(--muted)}
.history-season-body{padding:0 16px 12px;display:none}
.history-season-body.open{display:block}
.history-podium{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.podium-item{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500}
.podium-1{background:rgba(245,208,32,.15);color:var(--yellow);border:1px solid rgba(245,208,32,.3)}
.podium-2{background:rgba(176,184,197,.1);color:#b0b8c5;border:1px solid rgba(176,184,197,.2)}
.podium-3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2)}
.hidden{display:none!important}
@media(max-width:500px){
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .setup-grid{grid-template-columns:1fr}
  .site-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">
  <div class="site-header">
    <div class="logo-block">
      <div class="logo">Чемпіонат <span>України</span></div>
      <p id="header-subtitle">Прем'єр-ліга · Сезон 1 · 16 команд · 30 турів</p>
    </div>
    <div class="header-btns" id="header-btns"></div>
  </div>

  <!-- SETUP -->
  <div id="phase-setup">
    <div class="card">
      <div class="section-label" id="setup-label">Учасники чемпіонату</div>
      <div id="setup-preview-banner" class="hidden" style="margin-bottom:14px;padding:12px 14px;background:rgba(245,208,32,.06);border:1px solid rgba(245,208,32,.15);border-radius:10px">
        <div style="font-family:var(--font-d);font-size:18px;color:var(--yellow);letter-spacing:.04em" id="setup-season-title"></div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px" id="setup-season-sub"></div>
      </div>
      <div class="setup-grid" id="teams-grid"></div>
      <button class="btn btn-primary" id="btn-start-season" onclick="startSeason()">▶ Розпочати сезон</button>
    </div>
  </div>

  <!-- SEASON -->
  <div id="phase-season" class="hidden">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="season-progress-label">Тур 0 / 30</span>
        <span id="season-progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showSeasonTab('rounds')">Тури</button>
      <button class="tab" onclick="showSeasonTab('table')">Таблиця</button>
      <button class="tab" onclick="showSeasonTab('stats')">Статистика</button>
    </div>
    <div id="stab-rounds">
      <div class="rounds-nav" id="rounds-nav"></div>
      <div class="card" id="round-display"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-sim-round" onclick="simCurrentRound()">▶ Зіграти тур</button>
        <button class="btn btn-secondary" onclick="simAllRemaining()">Зіграти всі тури</button>
        <button class="btn btn-secondary btn-sm" onclick="prevRound()" id="btn-prev-r">◀</button>
        <button class="btn btn-secondary btn-sm" onclick="nextRound()" id="btn-next-r">▶</button>
      </div>
    </div>
    <div id="stab-table" class="hidden card">
      <table>
        <thead><tr><th>#</th><th>Команда</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th>РГ</th><th>О</th></tr></thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
    <div id="stab-stats" class="hidden">
      <div class="stat-grid" id="stats-grid"></div>
    </div>
  </div>

  <!-- FINAL -->
  <div id="phase-final" class="hidden">
    <div class="winner-banner" id="winner-banner">
      <img id="winner-logo" class="team-logo" style="width:44px;height:44px" src="" alt="">
      <div>
        <div class="winner-name" id="winner-name"></div>
        <div class="winner-sub" id="winner-sub"></div>
      </div>
    </div>
    <div id="relegation-info"></div>

    <div class="tabs" style="margin-top:1rem">
      <button class="tab active" onclick="showFinalTab('table')">Прем'єр-ліга</button>
      <button class="tab" onclick="showFinalTab('fl')">Перша ліга</button>
      <button class="tab" onclick="showFinalTab('stats')">Статистика</button>
      <button class="tab" onclick="showFinalTab('rounds')">Усі тури</button>
    </div>
    <div id="ftab-table" class="card">
      <table>
        <thead><tr><th>#</th><th>Команда</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th>РГ</th><th>О</th></tr></thead>
        <tbody id="final-standings-body"></tbody>
      </table>
    </div>
    <div id="ftab-fl" class="card hidden">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase">Перша ліга · Підсумкова таблиця</div>
      <table>
        <thead><tr><th>#</th><th>Команда</th><th>О</th></tr></thead>
        <tbody id="final-fl-body"></tbody>
      </table>
    </div>
    <div id="ftab-stats" class="hidden"></div>
    <div id="ftab-rounds" class="hidden"></div>
    <div class="btn-row" style="margin-top:1.5rem">
      <button class="btn btn-primary" onclick="goOffseason()">⏭ Міжсезоння →</button>
      <button class="btn btn-secondary" onclick="showHistoryPanel()">📋 Архів</button>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div id="phase-history" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-secondary btn-sm" onclick="hideHistoryPanel()">◀ Назад</button>
        <div style="font-family:var(--font-d);font-size:22px;color:var(--yellow)">Архів сезонів</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-red" onclick="deleteAllHistory()">🗑 Очистити архів</button>
        <button class="btn-red" onclick="resetCampaign()">↺ Нова кампанія</button>
      </div>
    </div>
    <div class="tabs" style="margin-bottom:1rem">
      <button class="tab active" onclick="showHistoryTab('seasons')">Сезони</button>
      <button class="tab" onclick="showHistoryTab('alltime')">Загальний залік</button>
      <button class="tab" onclick="showHistoryTab('medals')">Медалі</button>
    </div>
    <div id="htab-seasons">
      <div id="history-list"></div>
      <div id="history-empty" class="card" style="text-align:center;color:var(--muted);padding:2rem">Ще немає завершених сезонів</div>
    </div>
    <div id="htab-alltime" class="hidden"></div>
    <div id="htab-medals" class="hidden"></div>
  </div>
</div>

<!-- OFFSEASON MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Міжсезоння</div>
    <div class="modal-sub" id="modal-sub">Трансфери, зміни тренерів та форма команд</div>
    <div id="modal-news"></div>
    <div style="margin-top:1.5rem;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="closeOffseason()">▶ Розпочати новий сезон</button>
    </div>
  </div>
</div>

// ── PROMOTION / RELEGATION ────────────────────────────────────────────────
function doPromotionRelegation(plSorted, flSorted, news){
  const relegated = [plSorted[14], plSorted[15]].filter(Boolean);
  const promoted  = [flSorted[0],  flSorted[1]].filter(Boolean);

  // Remove relegated from PL, add to FL
  relegated.forEach(t=>{
    const idx = teamState.findIndex(x=>x.n===t.n);
    if(idx===-1) return;
    const team = {...teamState[idx], r:Math.max(44,teamState[idx].r-3), form:0, transferBonus:0};
    firstLeagueState.push(team);
    teamState.splice(idx,1);
    news.push({icon:'⬇️', title:`${t.n} — вилітає до Першої ліги`,
      desc:`Фінішував на ${plSorted.indexOf(t)+1}-му місці. Вихід до нижчого дивізіону.`,
      delta:'-3', positive:false});
  });

  // Remove promoted from FL, add to PL
  promoted.forEach((t,pi)=>{
    const idx = firstLeagueState.findIndex(x=>x.n===t.n);
    if(idx===-1) return;
    const team = {...firstLeagueState[idx], r:Math.min(70,firstLeagueState[idx].r+4), form:2, transferBonus:0};
    teamState.push(team);
    firstLeagueState.splice(idx,1);
    news.push({icon:'⬆️', title:`${t.n} — підвищується до Прем'єр-ліги`,
      desc:`${pi===0?'Переможець':'2-е місце'} Першої ліги. Команда дебютує у вищому дивізіоні!`,
      delta:'+4', positive:true});
  });

  // Safety: keep both leagues at 16
  while(teamState.length > 16){ const e=teamState.pop(); firstLeagueState.push({...e,r:Math.max(44,e.r-2),form:0}); }
  while(firstLeagueState.length > 16) firstLeagueState.pop();
  while(teamState.length < 16 && firstLeagueState.length > 0){
    const e=firstLeagueState.shift(); teamState.push({...e,r:Math.min(70,e.r+2),form:0});
  }
}

// ── SCHEDULE ─────────────────────────────────────────────────────────────
function generateSchedule(){
  const n=teamState.length;
  // Shuffle team indices so order changes every season
  const indices=Array.from({length:n},(_,i)=>i);
  for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
  const fixed=indices[0], rot=indices.slice(1);
  const half1=[];
  for(let r=0;r<n-1;r++){
    const circle=[fixed,...rot];
    const rnd=[];
    for(let i=0;i<n/2;i++) rnd.push({home:circle[i],away:circle[n-1-i],hg:null,ag:null});
    half1.push(rnd);
    rot.push(rot.shift());
  }
  // Shuffle round order for first half, then build second half mirrored
  half1.sort(()=>Math.random()-.5);
  const half2=half1.map(rnd=>[...rnd].sort(()=>Math.random()-.5).map(m=>({home:m.away,away:m.home,hg:null,ag:null})));
  // Shuffle second half order independently
  half2.sort(()=>Math.random()-.5);
  return [...half1,...half2].map(rnd=>[...rnd].sort(()=>Math.random()-.5));
}

function initStats(){
  stats={};
  teamState.forEach(t=>stats[t.n]={played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0,recentForm:[]});
}

// ── REALISTIC GOAL ENGINE ─────────────────────────────────────────────────
// Expected goals based on rating + form + transfer bonus + home advantage
function effectiveRating(idx){
  const t=teamState[idx];
  // form: -8..+8 range, transferBonus: extra seasonal boost
  return Math.max(40, Math.min(99, t.r + t.form + t.transferBonus));
}

function poissonSample(lambda){
  lambda=Math.max(0.15,lambda);
  let L=Math.exp(-lambda),k=0,p=1;
  do{k++;p*=Math.random();}while(p>L);
  return k-1;
}

function simGoals(homeIdx, awayIdx){
  const rH=effectiveRating(homeIdx)+3; // small home advantage
  const rA=effectiveRating(awayIdx);
  const diff=(rH-rA)/100;
  // realistic xG: top teams ~1.7 avg, bottom ~0.9
  const xgH=Math.max(0.3, 1.25 + diff*1.2);
  const xgA=Math.max(0.3, 1.05 - diff*1.2);
  let hg=poissonSample(xgH);
  let ag=poissonSample(xgA);
  // Upset chance ~8%: flip who dominates
  if(Math.random()<0.08){
    const tmp=hg; hg=ag; ag=tmp;
    // sometimes wild scoreline
    if(Math.random()<0.3) { hg=Math.min(5,hg+1); }
  }
  return [Math.min(6,hg), Math.min(6,ag)];
}

function simulateRound(rndIdx){
  rounds[rndIdx].forEach(m=>{
    if(m.hg!==null) return;
    const [hg,ag]=simGoals(m.home,m.away);
    m.hg=hg; m.ag=ag;
    const hn=teamState[m.home].n, an=teamState[m.away].n;
    const h=stats[hn], a=stats[an];
    h.played++;a.played++;
    h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
    if(hg>ag){h.won++;h.pts+=3;a.lost++;h.recentForm.push('W');a.recentForm.push('L');}
    else if(hg<ag){a.won++;a.pts+=3;h.lost++;a.recentForm.push('W');h.recentForm.push('L');}
    else{h.drawn++;a.drawn++;h.pts++;a.pts++;h.recentForm.push('D');a.recentForm.push('D');}
    // Keep only last 5
    if(h.recentForm.length>5) h.recentForm=h.recentForm.slice(-5);
    if(a.recentForm.length>5) a.recentForm=a.recentForm.slice(-5);
  });
}

// ── OFFSEASON ENGINE ──────────────────────────────────────────────────────
const TRANSFER_TEMPLATES = [
  (t,delta)=>`${t} підписав зіркового форварда. Атака посилилась.`,
  (t,delta)=>`${t} залучив досвідченого захисника зі Східної Європи.`,
  (t,delta)=>`${t} укріпив середину поля новим плеймейкером.`,
  (t,delta)=>`${t} підписав перспективного воротаря з чемпіонату Польщі.`,
  (t,delta)=>`${t} залучив швидкісного вінгера з іспанської другої ліги.`,
  (t,delta)=>`Ключовий гравець пішов з ${t}. Команда послабилась.`,
  (t,delta)=>`${t} продав свого найкращого бомбардира в Туреччину.`,
];

function runOffseason(){
  const news=[];
  const sorted=_lastSorted.length ? _lastSorted : [];
  const champion=sorted[0]?sorted[0].n:'';
  const topFinishers=sorted.slice(0,4).map(t=>t.n);

  for(let i=0; i<teamState.length; i++){
    const t=teamState[i];
    const isChamp=t.n===champion;
    const isTop=topFinishers.includes(t.n); // top 4
    const wasInFL = !sorted.find(s=>s.n===t.n); // newly promoted
    const pos=sorted.findIndex(s=>s.n===t.n); // 0-based finish position
    const isBottom=pos>=12; // bottom 4 of PL last season
    let changes=[];

    // ── RATING CHANGES (bigger, more realistic) ──────────────────────────
    // Base drift: every team has natural random variance each season
    let ratingDelta=0;

    if(isChamp){
      // Champion: usually stays strong, small chance of losing key players
      ratingDelta = Math.random()<0.25 ? -Math.floor(Math.random()*4) : Math.floor(Math.random()*5);
    } else if(wasInFL){
      // Newly promoted: investment, excitement — usually improves
      ratingDelta = Math.floor(Math.random()*7) - 1; // -1..+6
    } else if(isTop){
      // Top 4: tend to improve or stay
      ratingDelta = Math.floor(Math.random()*6) - 1; // -1..+5
    } else if(isBottom){
      // Bottom 4: pressure, budget cuts, tend to drop
      ratingDelta = Math.floor(Math.random()*8) - 6; // -6..+2
    } else {
      // Mid-table: pure random swing
      ratingDelta = Math.floor(Math.random()*10) - 4; // -4..+6
    }

    // Random "breakout season" chance: any team can get a surprise boost
    if(Math.random()<0.08){
      const breakout=Math.floor(Math.random()*8)+3;
      ratingDelta+=breakout;
      changes.push({icon:'⚡',title:`Прорив: ${t.n}`,
        desc:`Несподіване посилення складу. Команда може здивувати цього сезону!`,
        delta:'+'+breakout,positive:true});
    }
    // Random "crisis" chance: any team can collapse
    if(Math.random()<0.06){
      const crisis=-(Math.floor(Math.random()*7)+3);
      ratingDelta+=crisis;
      changes.push({icon:'📉',title:`Криза: ${t.n}`,
        desc:`Фінансові проблеми або відхід лідерів. Складний сезон попереду.`,
        delta:''+crisis,positive:false});
    }

    const newR=Math.max(48,Math.min(97,t.r+ratingDelta));
    const actualDelta=newR-t.r;
    if(actualDelta!==0){
      teamState[i].r=newR;
      teamState[i].transferBonus=0;
      const sign=actualDelta>0?'+':'';
      const icon=actualDelta>0?'🟢':'🔴';
      const desc=actualDelta>0
        ? TRANSFER_TEMPLATES[Math.floor(Math.random()*5)](t.n,actualDelta)
        : TRANSFER_TEMPLATES[5+Math.floor(Math.random()*2)](t.n,actualDelta);
      if(!changes.find(c=>c.icon==='⚡'||c.icon==='📉'))
        changes.push({icon,title:`Трансфер: ${t.n}`,desc,delta:sign+actualDelta,positive:actualDelta>0});
    }

    // ── COACH CHANGE ─────────────────────────────────────────────────────
    if(t.coaches && t.coaches.length > 1){
      const coachChance=isChamp?0.05:wasInFL?0.35:isBottom?0.45:0.18;
      if(Math.random()<coachChance){
        const nextIdx=(t.coachIdx+1)%t.coaches.length;
        const oldCoach=t.coach;
        teamState[i].coachIdx=nextIdx;
        teamState[i].coach=t.coaches[nextIdx];
        const effect=Math.floor(Math.random()*7)-3; // -3..+3
        teamState[i].r=Math.max(48,Math.min(97,teamState[i].r+effect));
        changes.push({icon:'👔',title:`Новий тренер: ${t.n}`,
          desc:`${oldCoach} → ${teamState[i].coach}. ${effect>=0?'Команда оновлюється.':'Перехідний період.'}`,
          delta:effect>=0?'+'+effect:effect,positive:effect>=0});
      }
    }

    // ── FORM: based on actual season finish, resets each season ──────────
    // form now ranges -8..+8 and meaningfully affects match outcomes
    let newForm = 0;
    if(pos===0) newForm=8;           // champion: peak confidence
    else if(pos<=2) newForm=6;       // podium
    else if(pos<=5) newForm=3;       // top 6
    else if(pos<=9) newForm=0;       // mid table: neutral
    else if(pos<=12) newForm=-3;     // lower mid: slight slump
    else if(pos<=14) newForm=-6;     // near relegation
    else newForm=-8;                 // last place: crisis form
    if(wasInFL) newForm=Math.max(newForm, 2); // promoted teams arrive motivated
    // Add small random noise
    newForm+=Math.floor(Math.random()*3)-1;
    newForm=Math.max(-8,Math.min(8,newForm));
    teamState[i].form=newForm;

    changes.forEach(c=>news.push(c));
  }

  news.sort((a,b)=>(b.positive?1:0)-(a.positive?1:0));
  return news.slice(0,20);
}


// ── STANDINGS ─────────────────────────────────────────────────────────────
function getSorted(){
  return teamState.map(t=>({...t,...stats[t.n]})).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    const gdA=a.gf-a.ga,gdB=b.gf-b.ga;
    if(gdB!==gdA) return gdB-gdA;
    return b.gf-a.gf;
  });
}

function formDots(recentForm){
  if(!recentForm||!recentForm.length) return '';
  return '<span class="form-dots">'+recentForm.map(r=>{
    const col=r==='W'?'#4cde7a':r==='D'?'#f5d020':'#e06060';
    return `<span class="form-dot" style="background:${col}" title="${r}"></span>`;
  }).join('')+'</span>';
}

function renderStandings(bodyId){
  const sorted=getSorted();
  const medals=['🥇','🥈','🥉'];
  document.getElementById(bodyId).innerHTML=sorted.map((t,i)=>{
    const gd=t.gf-t.ga;
    // Euro zones + relegation
    const cls = i===0 ? 'zone-ucl'
              : i===1 ? 'zone-ucl-q'
              : i<=4  ? 'zone-uel'
              : i>=13 ? 'relegate' : '';
    const zoneBadge = i===0  ? '<span style="font-size:10px;color:#4a90e2;margin-left:3px" title="Груповий етап ЛЧ">🏆</span>'
                    : i===1  ? '<span style="font-size:10px;color:#5bc8f5;margin-left:3px" title="Кваліфікація ЛЧ">⭐</span>'
                    : i<=4   ? '<span style="font-size:10px;color:#c04070;margin-left:3px" title="Кваліфікація ЛЄ">🅴</span>'
                    : i>=14  ? '<span style="font-size:10px;color:#e06060;margin-left:3px" title="Вилітає">⬇</span>'
                    : i===13 ? '<span style="font-size:10px;color:#e08040;margin-left:3px" title="Зона небезпеки">⚠</span>' : '';
    const rf=stats[t.n]?stats[t.n].recentForm:[];
    return `<tr class="${cls}">
      <td style="font-size:13px;color:var(--muted)">${medals[i]||i+1}${zoneBadge}</td>
      <td><div class="team-cell">${logoImg(t.n,20)}<span>${t.n}</span>${formDots(rf)}</div></td>
      <td>${t.played}</td><td>${t.won}</td><td>${t.drawn}</td><td>${t.lost}</td>
      <td>${t.gf}</td><td>${t.ga}</td>
      <td>${gd>=0?'+':''}${gd}</td>
      <td class="pts-cell">${t.pts}</td>
    </tr>`;
  }).join('');
}

function renderRoundDisplay(rndIdx){
  const rnd=rounds[rndIdx];
  const played=rndIdx<simulatedUpTo;
  const isCurrent=rndIdx===simulatedUpTo&&simulatedUpTo<30;
  document.getElementById('round-display').innerHTML=`
    <div class="round-header">
      <span class="round-title">Тур ${rndIdx+1}</span>
      <span style="font-size:12px;color:var(--muted)">${played?'✓ зіграно':isCurrent?'▶ наступний':'— не зіграно'}</span>
    </div>
    ${rnd.map(m=>{
      const p=m.hg!==null,active=isCurrent;
      const cls=p?'played':active?'active':'future';
      const sc=p?`${m.hg} : ${m.ag}`:'– : –';
      return `<div class="match-row ${cls}">
        <div class="home-name">${TEAMS_NAME_AT(m.home)}${logoImg(teamState[m.home].n,16)}</div>
        <div class="score-box">${sc}</div>
        <div class="away-name">${logoImg(teamState[m.away].n,16)}${TEAMS_NAME_AT(m.away)}</div>
      </div>`;
    }).join('')}`;
  document.getElementById('btn-prev-r').disabled=rndIdx===0;
  document.getElementById('btn-next-r').disabled=rndIdx===rounds.length-1;
  const simBtn=document.getElementById('btn-sim-round');
  if(simulatedUpTo>=30){simBtn.disabled=true;simBtn.textContent='Сезон завершено';}
  else if(rndIdx===simulatedUpTo){simBtn.disabled=false;simBtn.textContent=`▶ Зіграти тур ${rndIdx+1}`;}
  else if(rndIdx<simulatedUpTo){simBtn.disabled=true;simBtn.textContent='Тур вже зіграно';}
  else{simBtn.disabled=true;simBtn.textContent='Спершу зіграйте попередній тур';}
}

function TEAMS_NAME_AT(idx){ return `<span>${teamState[idx].n}</span>`; }

function renderRoundsNav(){

function startSeason(){
  initStats();
  rounds=generateSchedule();
  simulatedUpTo=0;
  currentRound=0;
  const yr = 2012 + campaignSeason;
  document.getElementById('header-subtitle').textContent=`Прем'єр-ліга · Сезон ${yr}/${String(yr+1).slice(2)} · 16 команд · 30 турів`;
  show('phase-season');
  updateProgress();
  renderRoundsNav();
  renderRoundDisplay(0);
  renderStandings('standings-body');
  renderStats('stats-grid');
}

function simCurrentRound(){
  if(simulatedUpTo>=30) return;
  const playedRound=simulatedUpTo;
  simulateRound(playedRound);
  simulatedUpTo++;
  currentRound=playedRound;
  updateProgress();
  renderRoundsNav();
  renderRoundDisplay(currentRound);
  renderStandings('standings-body');
  renderStats('stats-grid');
  if(simulatedUpTo===30) finishSeason();
}

function simAllRemaining(){
  while(simulatedUpTo<30){simulateRound(simulatedUpTo);simulatedUpTo++;}
  currentRound=29;
  updateProgress();
  renderRoundsNav();
  renderRoundDisplay(29);
  renderStandings('standings-body');
  renderStats('stats-grid');
  finishSeason();
}

function prevRound(){if(currentRound>0){currentRound--;renderRoundsNav();renderRoundDisplay(currentRound);}}
function nextRound(){if(currentRound<rounds.length-1){currentRound++;renderRoundsNav();renderRoundDisplay(currentRound);}}

// stored so goOffseason can use it
let _lastSorted = [];
let _lastFlSorted = [];

function finishSeason(){
  const sorted=getSorted();
  _lastSorted = sorted;
  const winner=sorted[0];
  // Simulate First League in background (save result so goOffseason reuses same draw)
  const flSorted = simFirstLeagueSeason();
  _lastFlSorted = flSorted;
  const flWinner = flSorted[0];
  const flRunnerUp = flSorted[1];

  const record={
    season:campaignSeason,
    seasonYear: (2012+campaignSeason) + '/' + String(2013+campaignSeason).slice(2),
    date:new Date().toLocaleDateString('uk-UA'),
    winner:winner.n,
    podium:sorted.slice(0,3).map(t=>t.n),
    relegated:sorted.slice(14).map(t=>t.n),
    promoted:[flWinner.n, flRunnerUp?flRunnerUp.n:''],
    flWinner:flWinner.n,
    table:sorted.map(t=>({n:t.n,pts:t.pts,played:t.played,won:t.won,drawn:t.drawn,lost:t.lost,gf:t.gf,ga:t.ga})),
    totalGoals:sorted.reduce((s,t)=>s+t.gf,0),
    teamRatings:teamState.map(t=>({n:t.n,r:t.r,coach:t.coach})),
  };
  seasonHistory.unshift(record);
  localStorage.setItem('ua_champ_history2',JSON.stringify(seasonHistory));

  const logo=LOGO_URLS[winner.n]||'';
  document.getElementById('winner-logo').src=logo;
  document.getElementById('winner-name').textContent=winner.n;
  const _yr = 2012 + campaignSeason;
  document.getElementById('winner-sub').textContent=`Чемпіон України · Сезон ${_yr}/${String(_yr+1).slice(2)} · ${winner.pts} очок`;

  // Show relegation/promotion info in final screen
  const relDiv = document.getElementById('relegation-info');
  if(relDiv){
    relDiv.innerHTML=`
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
        <div style="background:rgba(220,50,50,.08);border:1px solid rgba(220,50,50,.25);border-radius:8px;padding:10px 14px;font-size:13px">
          <div style="color:#e06060;font-weight:600;margin-bottom:4px">⬇ Вилітають до Першої ліги</div>
          ${sorted.slice(14).map(t=>`<div>${t.n}</div>`).join('')}
        </div>
        <div style="background:rgba(76,222,122,.08);border:1px solid rgba(76,222,122,.25);border-radius:8px;padding:10px 14px;font-size:13px">
          <div style="color:#4cde7a;font-weight:600;margin-bottom:4px">⬆ Підвищуються з Першої ліги</div>
          <div>${flWinner.n} <span style="color:var(--muted)">(1-е місце)</span></div>
          ${flRunnerUp?`<div>${flRunnerUp.n} <span style="color:var(--muted)">(2-е місце)</span></div>`:''}
        </div>
      </div>`;
  }

  renderStandings('final-standings-body');
  // Render First League table
  const flMedals=['🥇','🥈','🥉'];
  document.getElementById('final-fl-body').innerHTML=flSorted.map((t,i)=>{
    const promCls=i<2?'champion':'';
    const promBadge=i<2?'<span style="font-size:10px;color:#4cde7a;margin-left:3px">⬆</span>':'';
    return `<tr class="${promCls}">
      <td style="font-size:13px;color:var(--muted)">${flMedals[i]||i+1}${promBadge}</td>
      <td><div class="team-cell">${logoImg(t.n,20)}<span>${t.n}</span></div></td>
      <td class="pts-cell">${t.pts}</td>
    </tr>`;
  }).join('');
  show('phase-final');
}

function goOffseason(){
  // First: do promotion/relegation using last season's sorted table
  // Reuse the SAME FL result from finishSeason — do NOT re-simulate!
  const promRelNews = [];
  doPromotionRelegation(_lastSorted, _lastFlSorted, promRelNews);

  // Then: run transfers/coaches for remaining PL teams
  const transferNews = runOffseason();
  const news = [...promRelNews, ...transferNews];

  campaignSeason++;
  saveGameState();
  const _oyr = 2012 + campaignSeason;
  document.getElementById('modal-title').textContent=`Міжсезоння ${_oyr-1}/${_oyr}`;
  document.getElementById('modal-sub').textContent=`Вильоти, підвищення, трансфери та підготовка до сезону ${_oyr}/${String(_oyr+1).slice(2)}`;

    <div class="news-item">
      <div class="news-icon">${item.icon}</div>
      <div class="news-body">
        <div class="news-title">${item.title} <span class="rating-change ${item.positive?'rating-up':'rating-down'}">${item.delta}</span></div>
        <div class="news-desc">${item.desc}</div>
      </div>
    </div>`).join('');
  document.getElementById('modal-overlay').classList.remove('hidden');
}

  // reset to seasons tab
  ['seasons','alltime','medals'].forEach(t=>document.getElementById('htab-'+t).classList.toggle('hidden',t!=='seasons'));
  document.querySelectorAll('#phase-history .tab').forEach((el,i)=>el.classList.toggle('active',i===0));
  show('phase-history');
}

function showHistoryTab(name){
  ['seasons','alltime','medals'].forEach(t=>document.getElementById('htab-'+t).classList.toggle('hidden',t!==name));
  document.querySelectorAll('#phase-history .tab').forEach((el,i)=>el.classList.toggle('active',['seasons','alltime','medals'][i]===name));
  if(name==='alltime') renderAllTime();
  if(name==='medals') renderMedals();
}

function getAllTeams(){
  // All 32 teams: PL base + FL base
  const all = [...new Set([
    ...BASE_TEAMS.map(t=>t.n),
    ...BASE_FIRST_LEAGUE.map(t=>t.n),
    // also include any current teams (in case of name changes)
    ...teamState.map(t=>t.n),
    ...firstLeagueState.map(t=>t.n),
  ])];
  return all;
}

function renderAllTime(){
  if(!seasonHistory.length){
    document.getElementById('htab-alltime').innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:2rem">Ще немає завершених сезонів</div>';
    return;
  }
  // Count PL points per team across all seasons
  const pts={}, played={}, won={}, drawn={}, lost={}, gf={}, ga={};
  getAllTeams().forEach(n=>{pts[n]=0;played[n]=0;won[n]=0;drawn[n]=0;lost[n]=0;gf[n]=0;ga[n]=0;});

  seasonHistory.forEach(s=>{
    if(!s.table) return;
    s.table.forEach(t=>{
      if(pts[t.n]===undefined){pts[t.n]=0;played[t.n]=0;won[t.n]=0;drawn[t.n]=0;lost[t.n]=0;gf[t.n]=0;ga[t.n]=0;}
      pts[t.n]+=t.pts||0;
      played[t.n]+=t.played||0;
      won[t.n]+=t.won||0;
      drawn[t.n]+=t.drawn||0;
      lost[t.n]+=t.lost||0;
      gf[t.n]+=t.gf||0;
      ga[t.n]+=t.ga||0;
    });
  });

  const sorted = getAllTeams()
    .filter(n=>pts[n]>0||played[n]>0)
    .sort((a,b)=>pts[b]-pts[a]||(won[b]-won[a]));

  const medals=['🥇','🥈','🥉'];
  document.getElementById('htab-alltime').innerHTML=`
    <div class="card">
      <div class="section-label" style="margin-bottom:12px">Загальний залік · Прем'єр-ліга · Всі сезони</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Враховуються тільки очки здобуті у вищій лізі</div>
      <table>
        <thead><tr>
          <th>#</th><th>Команда</th><th>Сезони</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th style="color:var(--yellow)">О</th>
        </tr></thead>
        <tbody>${sorted.map((n,i)=>{
          const gd=(gf[n]||0)-(ga[n]||0);
          const seasons=seasonHistory.filter(s=>s.table&&s.table.find(t=>t.n===n)).length;
          const rowCls=i===0?'champion':'';
          return `<tr class="${rowCls}">
            <td style="font-size:12px;color:var(--muted)">${medals[i]||i+1}</td>
            <td><div class="team-cell">${logoImg(n,18)}<span>${n}</span></div></td>
            <td style="color:var(--muted);font-size:12px">${seasons}</td>
            <td>${played[n]||0}</td>
            <td>${won[n]||0}</td>
            <td>${drawn[n]||0}</td>
            <td>${lost[n]||0}</td>
            <td>${gf[n]||0}</td>
            <td>${ga[n]||0}</td>
            <td class="pts-cell">${pts[n]||0}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

function renderMedals(){
  if(!seasonHistory.length){
    document.getElementById('htab-medals').innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:2rem">Ще немає завершених сезонів</div>';
    return;
  }
  const gold={}, silver={}, bronze={};
  getAllTeams().forEach(n=>{gold[n]=0;silver[n]=0;bronze[n]=0;});

  seasonHistory.forEach(s=>{
    if(!s.podium) return;
    const [g,sv,br]=s.podium;
    if(g){if(gold[g]===undefined)gold[g]=0; gold[g]++;}
    if(sv){if(silver[sv]===undefined)silver[sv]=0; silver[sv]++;}
    if(br){if(bronze[br]===undefined)bronze[br]=0; bronze[br]++;}
  });

  const allWithMedals=getAllTeams().filter(n=>(gold[n]||0)+(silver[n]||0)+(bronze[n]||0)>0);
  allWithMedals.sort((a,b)=>{
    const score=n=>(gold[n]||0)*100+(silver[n]||0)*10+(bronze[n]||0);
    return score(b)-score(a);
  });

  if(!allWithMedals.length){
    document.getElementById('htab-medals').innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:2rem">Ще немає нагороджених команд</div>';
    return;
  }

  document.getElementById('htab-medals').innerHTML=`
    <div class="card">
      <div class="section-label" style="margin-bottom:12px">Таблиця медалей · Прем'єр-ліга</div>
      <table>
        <thead><tr>
          <th>#</th><th>Команда</th>
          <th style="color:#f5d020">🥇</th>
          <th style="color:#aaaaaa">🥈</th>
          <th style="color:#cd7f32">🥉</th>
          <th style="color:var(--muted)">Всього</th>
        </tr></thead>
        <tbody>${allWithMedals.map((n,i)=>{
          const total=(gold[n]||0)+(silver[n]||0)+(bronze[n]||0);
          const rowCls=(gold[n]||0)>0&&i===0?'champion':'';
          return `<tr class="${rowCls}">
            <td style="font-size:12px;color:var(--muted)">${i+1}</td>
            <td><div class="team-cell">${logoImg(n,18)}<span>${n}</span></div></td>
            <td style="color:#f5d020;font-weight:700;font-size:15px">${gold[n]||0}</td>
            <td style="color:#aaaaaa;font-weight:700;font-size:15px">${silver[n]||0}</td>
            <td style="color:#cd7f32;font-weight:700;font-size:15px">${bronze[n]||0}</td>
            <td class="pts-cell">${total}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}
function hideHistoryPanel(){show(prevPhase==='phase-final'?'phase-final':prevPhase==='phase-season'?'phase-season':'phase-setup');}

function renderHistoryList(){
  const el=document.getElementById('history-list');
  const empty=document.getElementById('history-empty');
  if(!seasonHistory.length){el.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  el.innerHTML=seasonHistory.map((s,i)=>`
    <div class="history-season">
      <div class="history-season-header" onclick="toggleHistory(${i})">
        <div>
          <div class="history-season-title">Сезон ${s.seasonYear||s.season} · ${s.date}</div>
          <div class="history-season-sub">🏆 ${s.winner} · ${s.totalGoals} голів</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="event.stopPropagation();deleteOneSeason(${i})" style="background:transparent;border:none;color:#e06060;cursor:pointer;font-size:16px;padding:4px 6px;border-radius:6px">🗑</button>
          <span style="color:var(--muted);font-size:18px" id="harrow-${i}">▼</span>
        </div>
      </div>
      <div class="history-season-body" id="hbody-${i}">
        <div class="history-podium">
          <span class="podium-item podium-1">${logoImg(s.podium[0],16)} 🥇 ${s.podium[0]}</span>
          <span class="podium-item podium-2">${logoImg(s.podium[1]||'',16)} 🥈 ${s.podium[1]||'-'}</span>
          <span class="podium-item podium-3">${logoImg(s.podium[2]||'',16)} 🥉 ${s.podium[2]||'-'}</span>
        </div>
        ${s.relegated&&s.relegated.length?`<div style="font-size:12px;color:#e06060;margin-bottom:4px">⬇ Вилетіли: ${s.relegated.join(', ')}</div>`:''}
        ${s.promoted&&s.promoted.filter(Boolean).length?`<div style="font-size:12px;color:#4cde7a;margin-bottom:8px">⬆ Підвищились: ${s.promoted.filter(Boolean).join(', ')}</div>`:''}
        <table style="font-size:12px">
          <thead><tr><th>#</th><th>Команда</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th>О</th></tr></thead>
          <tbody>${s.table.map((t,j)=>`<tr><td>${j+1}</td><td style="text-align:left">${t.n}</td><td>${t.played}</td><td>${t.won}</td><td>${t.drawn}</td><td>${t.lost}</td><td>${t.gf}</td><td>${t.ga}</td><td style="color:var(--yellow);font-weight:700">${t.pts}</td></tr>`).join('')}</tbody>
        </table>
        ${s.teamRatings?`<div style="margin-top:10px;font-size:11px;color:var(--muted)">Рейтинги команд на кінець сезону: ${s.teamRatings.map(t=>`${t.n} (${t.r})`).join(' · ')}</div>`:''}
      </div>
    </div>`).join('');
}

function toggleHistory(i){
  const b=document.getElementById('hbody-'+i);
  const a=document.getElementById('harrow-'+i);
  b.classList.toggle('open');
  a.textContent=b.classList.contains('open')?'▲':'▼';
}
function deleteOneSeason(i){
  if(!confirm('Видалити цей сезон?')) return;
  seasonHistory.splice(i,1);
  localStorage.setItem('ua_champ_history2',JSON.stringify(seasonHistory));
  renderHistoryList();
}
function deleteAllHistory(){
  if(!confirm('Видалити весь архів?')) return;
  seasonHistory=[];
  localStorage.removeItem('ua_champ_history2');
  renderHistoryList();
}
function resetCampaign(){
  if(!confirm('Почати нову кампанію? Весь архів та прогрес буде видалено.')) return;
  seasonHistory=[];
  campaignSeason=1;
  teamState=BASE_TEAMS.map(t=>({...t,form:0,coach:t.coaches[0],coachIdx:0,transferBonus:0}));
  firstLeagueState=BASE_FIRST_LEAGUE.map(t=>({...t,form:0,coach:t.coaches[0],coachIdx:0,transferBonus:0}));
  _lastSorted=[]; _lastFlSorted=[];
  localStorage.removeItem('ua_champ_history2');
  localStorage.removeItem('ua_champ_state');
  buildSetupGrid();
  show('phase-setup');
}

function restartSeason(){
  if(!confirm('Скинути поточний сезон?')) return;
  buildSetupGrid();
  show('phase-setup');
}

// ── PHASE HELPER ──────────────────────────────────────────────────────────
function show(phaseId){
  ['phase-setup','phase-season','phase-final','phase-history'].forEach(p=>{
    document.getElementById(p).classList.toggle('hidden',p!==phaseId);
  });
  currentPhase=phaseId;
  const hb=document.getElementById('header-btns');
  if(phaseId==='phase-season'){
    hb.innerHTML=`
      <button class="btn btn-secondary btn-sm" onclick="showHistoryPanel()">📋 Архів</button>
      <button class="btn-red" onclick="restartSeason()">↺ Скинути</button>`;
  } else if(phaseId==='phase-setup'||phaseId==='phase-final'){
    hb.innerHTML=`<button class="btn btn-secondary btn-sm" onclick="showHistoryPanel()">📋 Архів</button>`;
  } else {
    hb.innerHTML='';
  }
}
let currentPhase='phase-setup';

// ── INIT ──────────────────────────────────────────────────────────────────
buildSetupGrid();
show('phase-setup');
</script>
</body>
</html>
