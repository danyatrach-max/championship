<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чемпіонат України з футболу</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--y:#f5d020;--bg:#08122b;--bg2:#0d1e40;--bg3:#112350;--brd:rgba(255,255,255,0.09);--tx:#eef2ff;--mt:#7a90c0;--fd:'Bebas Neue',sans-serif;--fb:'Inter',sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;padding:0 0 4rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(0,87,184,.22),transparent 65%);pointer-events:none;z-index:0}
.wrap{max-width:800px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:10px}
.logo{font-family:var(--fd);font-size:clamp(26px,7vw,52px);letter-spacing:.04em;line-height:1;color:var(--y)}
.logo span{color:var(--tx)}
.sub{font-size:11px;color:var(--mt);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.hbtns{display:flex;gap:8px;flex-wrap:wrap}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.slabel{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mt);margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:8px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btnP{background:var(--y);color:#08122b}.btnP:hover{background:#f7dc3a;transform:translateY(-1px)}
.btnS{background:transparent;color:var(--tx);border:1px solid var(--brd)}.btnS:hover{background:var(--bg3)}
.btnSm{padding:7px 14px;font-size:13px}
.btnR{background:transparent;color:#e06060;border:1px solid rgba(220,80,80,.3);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;padding:7px 14px;border-radius:8px;transition:all .15s}
.btnR:hover{background:rgba(220,80,80,.1)}
.brow{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--mt);transition:all .15s;font-family:var(--fb)}
.tab.on{background:var(--bg3);color:var(--tx);border:1px solid var(--brd)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:center;padding:6px;color:var(--mt);font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--brd)}
th:nth-child(2){text-align:left}
td{text-align:center;padding:8px 5px;border-bottom:1px solid var(--brd);color:var(--tx)}
td:nth-child(2){text-align:left}
tr:last-child td{border-bottom:none}
.yc{font-weight:700;color:var(--y)}
.tc{display:flex;align-items:center;gap:7px;font-weight:500;font-size:13px}
tr.champ td{background:rgba(245,208,32,.07)}
tr.rel td{background:rgba(220,50,50,.06)}
.rndh{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--brd);margin-bottom:4px}
.rndt{font-family:var(--fd);font-size:20px;letter-spacing:.04em;color:var(--y)}
.mr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--brd)}
.mr:last-child{border-bottom:none}
.mr.fut{opacity:.35}
.hn{text-align:right;font-weight:500;font-size:13px;display:flex;align-items:center;justify-content:flex-end;gap:5px}
.an{text-align:left;font-weight:500;font-size:13px;display:flex;align-items:center;gap:5px}
.sb{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:5px 10px;font-family:var(--fd);font-size:18px;letter-spacing:.06em;min-width:66px;text-align:center}
.mr.done .sb{border-color:rgba(245,208,32,.2);color:var(--y)}
.mr.cur .sb{border-color:var(--y)}
.pwrap{margin-bottom:1rem}
.pinfo{display:flex;justify-content:space-between;font-size:12px;color:var(--mt);margin-bottom:6px}
.pbar{height:4px;background:var(--brd);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:var(--y);border-radius:99px;transition:width .4s}
.wbanner{background:linear-gradient(135deg,rgba(245,208,32,.13),rgba(245,208,32,.04));border:1px solid rgba(245,208,32,.35);border-radius:12px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:14px;margin-bottom:1rem}
.wname{font-family:var(--fd);font-size:30px;color:var(--y);letter-spacing:.04em;line-height:1}
.wsub{font-size:13px;color:var(--mt);margin-top:4px}
.sgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:14px}
.slb{font-size:11px;color:var(--mt);margin-bottom:6px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.sv{font-family:var(--fd);font-size:20px;color:var(--tx)}
.ss{font-size:12px;color:var(--mt);margin-top:4px}
.rnav{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:1rem;scrollbar-width:thin}
.rbtn{flex-shrink:0;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--mt);font-family:var(--fb);transition:all .15s}
.rbtn.done{color:var(--tx);border-color:rgba(245,208,32,.2)}
.rbtn.cur{background:var(--y);color:#08122b;border-color:var(--y);font-weight:600}
.rbtn:hover:not(.cur){background:var(--bg3);color:var(--tx)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem}
.mt2{font-family:var(--fd);font-size:28px;color:var(--y);letter-spacing:.04em;margin-bottom:4px}
.ms{font-size:13px;color:var(--mt);margin-bottom:1.5rem}
.ni{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd)}
.ni:last-child{border-bottom:none}
.nic{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.nib{flex:1}
.nit{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:2px}
.nid{font-size:12px;color:var(--mt)}
.rc{font-size:12px;font-weight:600;margin-left:6px}
.ru{color:#4cde7a}.rd{color:#e06060}
.sgr{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
.tpill{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);font-size:13px;font-weight:500}
.rbadge{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(245,208,32,.1);color:var(--y);font-weight:600}
.fdots{display:flex;gap:3px;margin-left:4px}
.fd{width:8px;height:8px;border-radius:50%}
.hseason{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.hshead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.hshead:hover{background:var(--bg3)}
.hst{font-family:var(--fd);font-size:18px;color:var(--y);letter-spacing:.04em}
.hss{font-size:12px;color:var(--mt)}
.hsbody{padding:0 16px 12px;display:none}
.hsbody.open{display:block}
.hpod{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pi{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500}
.p1{background:rgba(245,208,32,.15);color:var(--y);border:1px solid rgba(245,208,32,.3)}
.p2{background:rgba(176,184,197,.1);color:#b0b8c5;border:1px solid rgba(176,184,197,.2)}
.p3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2)}
.hidden{display:none!important}
@media(max-width:500px){.sgrid{grid-template-columns:repeat(2,minmax(0,1fr))}.sgr{grid-template-columns:1fr}.hdr{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="logo">Чемпіонат <span>України</span></div>
      <div class="sub" id="hsub">Прем'єр-ліга · Сезон 1 · 16 команд · 30 турів</div>
    </div>
    <div class="hbtns" id="hbtns"></div>
  </div>
  <div id="ph-setup">
    <div class="card">
      <div class="slabel">Учасники чемпіонату</div>
      <div class="sgr" id="tgrid"></div>
      <button class="btn btnP" onclick="startSeason()">▶ Розпочати сезон</button>
    </div>
  </div>
  <div id="ph-season" class="hidden">
    <div class="pwrap">
      <div class="pinfo"><span id="plabel">Тур 0 / 30</span><span id="ppct">0%</span></div>
      <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
    </div>
    <div class="tabs" id="stabs">
      <button class="tab on" onclick="showSTab(0)">Тури</button>
      <button class="tab" onclick="showSTab(1)">Таблиця</button>
      <button class="tab" onclick="showSTab(2)">Статистика</button>
    </div>
    <div id="st0">
      <div class="rnav" id="rnav"></div>
      <div class="card" id="rdisplay"></div>
      <div class="brow">
        <button class="btn btnP" id="btn-sim" onclick="simRound()">▶ Зіграти тур</button>
        <button class="btn btnS" onclick="simAll()">Зіграти всі тури</button>
        <button class="btn btnS btnSm" id="btn-pr" onclick="goRound(-1)">◀</button>
        <button class="btn btnS btnSm" id="btn-nr" onclick="goRound(1)">▶</button>
      </div>
    </div>
    <div id="st1" class="hidden card">
      <table><thead><tr><th>#</th><th>Команда</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th>РГ</th><th>О</th></tr></thead><tbody id="stbody"></tbody></table>
    </div>
    <div id="st2" class="hidden"><div class="sgrid" id="ssgrid"></div></div>
  </div>
  <div id="ph-final" class="hidden">
    <div class="wbanner">
      <img id="wlogo" style="width:44px;height:44px;object-fit:contain" src="" alt="">
      <div><div class="wname" id="wname"></div><div class="wsub" id="wsub"></div></div>
    </div>
    <div id="relinfo"></div>
    <div class="tabs" id="ftabs" style="margin-top:1rem">
      <button class="tab on" onclick="showFTab(0)">Таблиця</button>
      <button class="tab" onclick="showFTab(1)">Статистика</button>
      <button class="tab" onclick="showFTab(2)">Усі тури</button>
    </div>
    <div id="ft0" class="card"><table><thead><tr><th>#</th><th>Команда</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th>РГ</th><th>О</th></tr></thead><tbody id="ftbody"></tbody></table></div>
    <div id="ft1" class="hidden"></div>
    <div id="ft2" class="hidden"></div>
    <div class="brow" style="margin-top:1.5rem">
      <button class="btn btnP" onclick="goOffseason()">⏭ Міжсезоння →</button>
      <button class="btn btnS" onclick="showHistory()">📋 Архів</button>
    </div>
  </div>
  <div id="ph-hist" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btnS btnSm" onclick="hideHistory()">◀ Назад</button>
        <div style="font-family:var(--fd);font-size:22px;color:var(--y)">Архів сезонів</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btnR" onclick="delAllHist()">🗑 Очистити</button>
        <button class="btnR" onclick="resetCampaign()">↺ Нова кампанія</button>
      </div>
    </div>
    <div id="hlist"></div>
    <div id="hempty" class="card" style="text-align:center;color:var(--mt);padding:2rem">Ще немає завершених сезонів</div>
  </div>
</div>
<div class="modal-ov hidden" id="modal-ov">
  <div class="modal">
    <div class="mt2" id="modal-t">Міжсезоння</div>
    <div class="ms" id="modal-s"></div>
    <div id="modal-news"></div>
    <div style="margin-top:1.5rem"><button class="btn btnP" onclick="closeOffseason()">▶ Новий сезон</button></div>
  </div>
</div>

// ── SAVE / LOAD ───────────────────────────────────────────────────────────
// Saves the FULL current state: which teams are in PL, which are in FL,

function saveState(){
  try{
    localStorage.setItem(KEY_STATE, JSON.stringify({
      season: season,
      PL: PL,
      FL: FL
    }));
  }catch(e){}
}

function loadState(){
  try{
    var raw = localStorage.getItem(KEY_STATE);
    if(!raw) return false;
    var obj = JSON.parse(raw);
    if(!obj || !Array.isArray(obj.PL) || obj.PL.length < 16) return false;
    season = obj.season || 1;
    PL = obj.PL;
    FL = obj.FL || BASE_FL.map(function(t){return mkTeam(t);});
    return true;
  }catch(e){ return false; }
}

  try{ localStorage.setItem(KEY_HISTORY, JSON.stringify(history)); }catch(e){}
}

function loadHistory(){
  try{
    var raw = localStorage.getItem(KEY_HISTORY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

  return {n:t.n,r:t.r,c:t.c,coaches:t.coaches,form:t.form||0,coach:t.coach||t.coaches[0],ci:t.ci||0,tb:t.tb||0};

// ── SCHEDULE ──────────────────────────────────────────────────────────────
function makeSchedule(){
  var n=PL.length, rot=[];
  for(var i=1;i<n;i++) rot.push(i);
  var h1=[];
  for(var r=0;r<n-1;r++){
    var circle=[0].concat(rot.slice()), rnd=[];
    for(var i=0;i<n/2;i++) rnd.push({h:circle[i],a:circle[n-1-i],hg:null,ag:null});
    h1.push(rnd);
    rot.push(rot.shift());
  }
  var h2=h1.map(function(rnd){
    return rnd.slice().sort(function(){return Math.random()-.5;}).map(function(m){return {h:m.a,a:m.h,hg:null,ag:null};});
  });
  return h1.concat(h2).map(function(rnd){return rnd.slice().sort(function(){return Math.random()-.5;});});
}

function initStats(){
  stats={};
  PL.forEach(function(t){stats[t.n]={played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0,rf:[]};});
}

// ── GOAL ENGINE ───────────────────────────────────────────────────────────
function poisson(lam){
  lam=Math.max(0.15,lam);
  var L=Math.exp(-lam),k=0,p=1;
  do{k++;p*=Math.random();}while(p>L);
  return k-1;
}
function simGoals(hi,ai){
  var rH=Math.max(40,Math.min(99,PL[hi].r+PL[hi].form+PL[hi].tb))+3;
  var rA=Math.max(40,Math.min(99,PL[ai].r+PL[ai].form+PL[ai].tb));
  var diff=(rH-rA)/100;
  var hg=poisson(Math.max(0.3,1.25+diff*1.2));
  var ag=poisson(Math.max(0.3,1.05-diff*1.2));
  if(Math.random()<0.08){var tmp=hg;hg=ag;ag=tmp;if(Math.random()<0.3)hg=Math.min(5,hg+1);}
  return [Math.min(6,hg),Math.min(6,ag)];
}
function simRound_do(ri){
  rounds[ri].forEach(function(m){
    if(m.hg!==null) return;
    var r=simGoals(m.h,m.a);
    m.hg=r[0];m.ag=r[1];
    var hn=PL[m.h].n,an=PL[m.a].n,h=stats[hn],a=stats[an];
    h.played++;a.played++;
    h.gf+=m.hg;h.ga+=m.ag;a.gf+=m.ag;a.ga+=m.hg;
    if(m.hg>m.ag){h.won++;h.pts+=3;a.lost++;h.rf.push('W');a.rf.push('L');}
    else if(m.hg<m.ag){a.won++;a.pts+=3;h.lost++;a.rf.push('W');h.rf.push('L');}
    else{h.drawn++;a.drawn++;h.pts++;a.pts++;h.rf.push('D');a.rf.push('D');}
    if(h.rf.length>5)h.rf=h.rf.slice(-5);
    if(a.rf.length>5)a.rf=a.rf.slice(-5);
  });
}

// ── TABLE ─────────────────────────────────────────────────────────────────
function getSorted(){
  return PL.map(function(t){return Object.assign({},t,stats[t.n]||{played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0,rf:[]});}).sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    if((b.gf-b.ga)!==(a.gf-a.ga))return(b.gf-b.ga)-(a.gf-a.ga);
    return b.gf-a.gf;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
function fdots(rf){
  if(!rf||!rf.length) return '';
  return '<span class="fdots">'+rf.map(function(r){var c=r==='W'?'#4cde7a':r==='D'?'#f5d020':'#e06060';return '<span class="fd" style="background:'+c+'"></span>';}).join('')+'</span>';
}
function renderTable(bid){
  var s=getSorted(),medals=['🥇','🥈','🥉'];
  document.getElementById(bid).innerHTML=s.map(function(t,i){
    var gd=t.gf-t.ga,cls=i===0?'champ':i>=14?'rel':'',rf=stats[t.n]?stats[t.n].rf:[];
    return '<tr class="'+cls+'"><td style="font-size:13px;color:var(--mt)">'+(medals[i]||(i+1))+'</td>'
      +'<td><div class="tc">'+LI(t.n,20)+'<span>'+t.n+'</span>'+fdots(rf)+'</div></td>'
      +'<td>'+t.played+'</td><td>'+t.won+'</td><td>'+t.drawn+'</td><td>'+t.lost+'</td>'
      +'<td>'+t.gf+'</td><td>'+t.ga+'</td><td>'+(gd>=0?'+':'')+gd+'</td><td class="yc">'+t.pts+'</td></tr>';
  }).join('');
}
function renderRound(ri){
  var rnd=rounds[ri],done=ri<simUpTo,isCur=ri===simUpTo&&simUpTo<30;
  var html='<div class="rndh"><span class="rndt">Тур '+(ri+1)+'</span>'
    +'<span style="font-size:12px;color:var(--mt)">'+(done?'✓ зіграно':isCur?'▶ наступний':'— не зіграно')+'</span></div>';
  html+=rnd.map(function(m){
    var p=m.hg!==null,cls=p?'done':isCur?'cur':'fut',sc=p?(m.hg+' : '+m.ag):'– : –';
    return '<div class="mr '+cls+'"><div class="hn">'+PL[m.h].n+' '+LI(PL[m.h].n,15)+'</div>'
      +'<div class="sb">'+sc+'</div>'
      +'<div class="an">'+LI(PL[m.a].n,15)+' '+PL[m.a].n+'</div></div>';
  }).join('');
  document.getElementById('rdisplay').innerHTML=html;
  document.getElementById('btn-pr').disabled=ri===0;
  document.getElementById('btn-nr').disabled=ri===rounds.length-1;
  var sb=document.getElementById('btn-sim');
  if(simUpTo>=30){sb.disabled=true;sb.textContent='Сезон завершено';}
  else if(ri===simUpTo){sb.disabled=false;sb.textContent='▶ Зіграти тур '+(ri+1);}
  else if(ri<simUpTo){sb.disabled=true;sb.textContent='Тур вже зіграно';}
  else{sb.disabled=true;sb.textContent='Спершу зіграйте попередній тур';}
}
function renderRnav(){
  var nav=document.getElementById('rnav');
  nav.innerHTML=rounds.map(function(_,i){
    var cls=i<simUpTo?'done':i===simUpTo&&simUpTo<30?'cur':'';
    return '<button class="rbtn '+cls+'" onclick="jumpR('+i+')">'+(i+1)+'</button>';
  }).join('');
  var btn=nav.querySelectorAll('.rbtn')[curR];
  if(btn)btn.scrollIntoView({inline:'nearest',block:'nearest'});
}
function renderStats(cid){
  var s=getSorted();
  var top=s.slice().sort(function(a,b){return b.gf-a.gf;})[0];
  var def=s.slice().sort(function(a,b){return a.ga-b.ga;})[0];
  var total=s.reduce(function(acc,t){return acc+t.gf;},0);
  var played=simUpTo*8,avg=played>0?(total/played).toFixed(2):'-';
  var html='<div class="sc"><div class="slb">Топ атака</div>'
    +'<div style="display:flex;align-items:center;gap:6px;margin:4px 0">'+LI(top.n,26)+'<div style="font-size:15px;font-weight:600">'+top.n+'</div></div>'
    +'<div class="ss">'+top.gf+' голів</div></div>'
    +'<div class="sc"><div class="slb">Топ захист</div>'
    +'<div style="display:flex;align-items:center;gap:6px;margin:4px 0">'+LI(def.n,26)+'<div style="font-size:15px;font-weight:600">'+def.n+'</div></div>'
    +'<div class="ss">'+def.ga+' пропущено</div></div>'
    +'<div class="sc"><div class="slb">Голів / матч</div><div class="sv">'+avg+'</div><div class="ss">'+total+' у '+played+' матчах</div></div>';
  s.slice(0,4).forEach(function(t,i){
    var gd=t.gf-t.ga;
    html+='<div class="sc"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+LI(t.n,18)
      +'<div class="slb" style="margin:0">'+(['🥇 Чемпіон','🥈 2-е','🥉 3-є','4-е'][i])+'</div></div>'
      +'<div style="font-size:13px;font-weight:600">'+t.n+'</div>'
      +'<div class="ss">'+t.pts+' оч · '+t.won+'В '+t.drawn+'Н '+t.lost+'П · '+(gd>=0?'+':'')+gd+'</div></div>';
  });
  document.getElementById(cid).innerHTML=html;
}
function updateProgress(){
  var pct=Math.round(simUpTo/30*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('plabel').textContent='Тур '+simUpTo+' / 30';
  document.getElementById('ppct').textContent=pct+'%';
}
function buildSetupGrid(){
  var s=PL.slice().sort(function(a,b){return b.r-a.r;});
  document.getElementById('tgrid').innerHTML=s.map(function(t){
    return '<div class="tpill">'+LI(t.n,22)+'<span style="flex:1">'+t.n+'</span>'
      +'<span style="font-size:11px;color:var(--mt)">'+t.coach+'</span>'
      +'<span class="rbadge">'+t.r+'</span></div>';
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function startSeason(){
  initStats();
  rounds=makeSchedule();
  simUpTo=0;curR=0;
  document.getElementById('hsub').textContent="Прем'єр-ліга · Сезон "+season+" · 16 команд · 30 турів";
  showPhase('ph-season');
  updateProgress();renderRnav();renderRound(0);renderTable('stbody');renderStats('ssgrid');
}
function simRound(){
  if(simUpTo>=30) return;
  var ri=simUpTo;
  simRound_do(ri);simUpTo++;curR=ri;
  updateProgress();renderRnav();renderRound(curR);renderTable('stbody');renderStats('ssgrid');
  if(simUpTo===30) finishSeason();
}
function simAll(){
  while(simUpTo<30){simRound_do(simUpTo);simUpTo++;}
  curR=29;updateProgress();renderRnav();renderRound(29);renderTable('stbody');renderStats('ssgrid');
  finishSeason();
}
function goRound(d){curR=Math.max(0,Math.min(rounds.length-1,curR+d));renderRnav();renderRound(curR);}
function jumpR(i){curR=i;renderRnav();renderRound(i);}
function showSTab(n){
  [0,1,2].forEach(function(i){document.getElementById('st'+i).classList.toggle('hidden',i!==n);});
  document.querySelectorAll('#stabs .tab').forEach(function(el,i){el.classList.toggle('on',i===n);});
  if(n===2)renderStats('ssgrid');
}
function showFTab(n){
  [0,1,2].forEach(function(i){document.getElementById('ft'+i).classList.toggle('hidden',i!==n);});
  document.querySelectorAll('#ftabs .tab').forEach(function(el,i){el.classList.toggle('on',i===n);});
  if(n===1){document.getElementById('ft1').innerHTML='<div class="sgrid" id="fsg"></div>';renderStats('fsg');}
  if(n===2){
    document.getElementById('ft2').innerHTML=rounds.map(function(rnd,ri){
      return '<div class="card" style="margin-bottom:8px"><div class="rndh"><span class="rndt">Тур '+(ri+1)+'</span></div>'
        +rnd.map(function(m){return '<div class="mr done"><div class="hn">'+PL[m.h].n+' '+LI(PL[m.h].n,15)+'</div><div class="sb">'+m.hg+' : '+m.ag+'</div><div class="an">'+LI(PL[m.a].n,15)+' '+PL[m.a].n+'</div></div>';}).join('')
        +'</div>';
    }).join('');
  }
}

// ── FIRST LEAGUE ──────────────────────────────────────────────────────────
function simFL(){
  return FL.map(function(t){
    var pts=Math.max(0,Math.round((t.r/55)*55+(Math.random()*30-15)));
    return Object.assign({},t,{pts:pts});
  }).sort(function(a,b){return b.pts-a.pts;});
}
function doRelProm(plS,flS,news){
  var rel=[plS[14],plS[15]].filter(Boolean);
  var prom=[flS[0],flS[1]].filter(Boolean);
  rel.forEach(function(t){
    var idx=PL.findIndex(function(x){return x.n===t.n;});
    if(idx===-1)return;
    var tm=Object.assign({},PL[idx],{r:Math.max(44,PL[idx].r-3),form:0,tb:0});
    FL.push(tm);PL.splice(idx,1);
    news.push({icon:'⬇️',title:t.n+' вилітає до Першої ліги',desc:'Посів '+(plS.indexOf(t)+1)+'-е місце.',delta:'-3',pos:false});
  });
  prom.forEach(function(t,pi){
    var idx=FL.findIndex(function(x){return x.n===t.n;});
    if(idx===-1)return;
    var tm=Object.assign({},FL[idx],{r:Math.min(70,FL[idx].r+4),form:2,tb:0});
    PL.push(tm);FL.splice(idx,1);
    news.push({icon:'⬆️',title:t.n+' підвищується до Прем\'єр-ліги',desc:(pi===0?'Переможець':'2-е місце')+' Першої ліги!',delta:'+4',pos:true});
  });
  while(PL.length>16){var e=PL.pop();FL.push(Object.assign({},e,{r:Math.max(44,e.r-2),form:0}));}
  while(FL.length>16)FL.pop();
  while(PL.length<16&&FL.length>0){var e2=FL.shift();PL.push(Object.assign({},e2,{r:Math.min(70,e2.r+2),form:0}));}
}

// ── OFFSEASON ─────────────────────────────────────────────────────────────
var TRANS=[
  function(n){return n+' підписав зіркового форварда. Атака посилилась.';},
  function(n){return n+' залучив досвідченого захисника зі Східної Європи.';},
  function(n){return n+' укріпив середину поля новим плеймейкером.';},
  function(n){return n+' підписав перспективного воротаря з Польщі.';},
  function(n){return n+' залучив швидкісного вінгера з Іспанії.';},
  function(n){return 'Ключовий гравець пішов з '+n+'. Команда послабилась.';},
  function(n){return n+' продав найкращого бомбардира в Туреччину.';},
];
function doOffseason(){
  var news=[];
  var flS=simFL();
  doRelProm(lastSorted,flS,news);
  // SAVE immediately after rel/prom so new PL/FL is persisted
  saveState();

  var champ=lastSorted[0]?lastSorted[0].n:'';
  var top4=lastSorted.slice(0,4).map(function(t){return t.n;});
  for(var i=0;i<PL.length;i++){
    var t=PL[i];
    var isChamp=t.n===champ;
    var wasFL=!lastSorted.find(function(s){return s.n===t.n;});
    var delta=isChamp?Math.floor(Math.random()*4):wasFL?Math.floor(Math.random()*3):top4.indexOf(t.n)>=0?Math.floor(Math.random()*3)-1:Math.floor(Math.random()*8)-3;
    var newR=Math.max(45,Math.min(97,t.r+delta));
    if(newR!==t.r){
      PL[i].r=newR;PL[i].tb=0;
      var sign=delta>0?'+':'',icon2=delta>0?'🟢':'🔴';
      var desc=delta>0?TRANS[Math.floor(Math.random()*5)](t.n):TRANS[5+Math.floor(Math.random()*2)](t.n);
      news.push({icon:icon2,title:'Трансфер: '+t.n,desc:desc,delta:sign+delta,pos:delta>0});
    }
    if(t.coaches&&t.coaches.length>1){
      var cc=isChamp?0.05:wasFL?0.4:0.18;
      if(Math.random()<cc){
        var ni2=(t.ci+1)%t.coaches.length,oc=t.coach;
        PL[i].ci=ni2;PL[i].coach=t.coaches[ni2];
        var eff=Math.floor(Math.random()*6)-2;
        PL[i].r=Math.max(45,Math.min(97,PL[i].r+eff));
        news.push({icon:'👔',title:'Новий тренер: '+t.n,desc:oc+' → '+PL[i].coach+'.',delta:eff>=0?'+'+eff:eff,pos:eff>=0});
      }
    }
    var pos=lastSorted.findIndex(function(s){return s.n===t.n;});
    PL[i].form=pos>=0&&pos<=3?3:pos>=12?-3:wasFL?1:0;
  }
  // SAVE again after all transfers
  saveState();
  news.sort(function(a,b){return(b.pos?1:0)-(a.pos?1:0);});
  return news.slice(0,22);
}

// ── FINISH SEASON ─────────────────────────────────────────────────────────
function finishSeason(){
  var s=getSorted();lastSorted=s;
  var flS=simFL(),w=s[0];
  var record={
    season:season,date:new Date().toLocaleDateString('uk-UA'),winner:w.n,
    podium:s.slice(0,3).map(function(t){return t.n;}),
    relegated:s.slice(14).map(function(t){return t.n;}),
    promoted:[flS[0].n,flS[1]?flS[1].n:''],
    table:s.map(function(t){return {n:t.n,pts:t.pts,played:t.played,won:t.won,drawn:t.drawn,lost:t.lost,gf:t.gf,ga:t.ga};}),
    totalGoals:s.reduce(function(acc,t){return acc+t.gf;},0),
  };
  history.unshift(record);
  saveHistory(); // save history

  document.getElementById('wlogo').src=LOGO_URLS[w.n]||'';
  document.getElementById('wname').textContent=w.n;
  document.getElementById('wsub').textContent='Чемпіон України · Сезон '+season+' · '+w.pts+' очок';
  document.getElementById('relinfo').innerHTML=
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">'
    +'<div style="background:rgba(220,50,50,.08);border:1px solid rgba(220,50,50,.25);border-radius:8px;padding:10px 14px;font-size:13px">'
    +'<div style="color:#e06060;font-weight:600;margin-bottom:4px">⬇ Вилітають до Першої ліги</div>'
    +s.slice(14).map(function(t){return '<div>'+t.n+'</div>';}).join('')+'</div>'
    +'<div style="background:rgba(76,222,122,.08);border:1px solid rgba(76,222,122,.25);border-radius:8px;padding:10px 14px;font-size:13px">'
    +'<div style="color:#4cde7a;font-weight:600;margin-bottom:4px">⬆ Підвищуються з Першої ліги</div>'
    +'<div>'+flS[0].n+' <span style="color:var(--mt)">(1-е)</span></div>'
    +(flS[1]?'<div>'+flS[1].n+' <span style="color:var(--mt)">(2-е)</span></div>':'')
    +'</div></div>';
  renderTable('ftbody');
  showPhase('ph-final');
}
function goOffseason(){
  var news=doOffseason();
  season++;
  saveState(); // save new season number
  document.getElementById('modal-t').textContent='Міжсезоння '+(season-1)+'/'+season;
  document.getElementById('modal-s').textContent='Вильоти, підвищення, трансфери — Сезон '+season;
  document.getElementById('modal-news').innerHTML=news.map(function(item){
    return '<div class="ni"><div class="nic">'+item.icon+'</div>'
      +'<div class="nib"><div class="nit">'+item.title+' <span class="rc '+(item.pos?'ru':'rd')+'">'+item.delta+'</span></div>'
      +'<div class="nid">'+item.desc+'</div></div></div>';
  }).join('');
  document.getElementById('modal-ov').classList.remove('hidden');
}
function closeOffseason(){
  document.getElementById('modal-ov').classList.add('hidden');
  buildSetupGrid();
  startSeason();
}

// ── HISTORY UI ────────────────────────────────────────────────────────────
function showHistory(){prevPhase=curPhase;renderHistory();showPhase('ph-hist');}
function hideHistory(){showPhase(prevPhase==='ph-final'?'ph-final':prevPhase==='ph-season'?'ph-season':'ph-setup');}
function renderHistory(){
  var el=document.getElementById('hlist'),em=document.getElementById('hempty');
  if(!history.length){el.innerHTML='';em.classList.remove('hidden');return;}
  em.classList.add('hidden');
  el.innerHTML=history.map(function(s,i){
    return '<div class="hseason"><div class="hshead" onclick="togH('+i+')">'
      +'<div><div class="hst">Сезон '+s.season+' · '+s.date+'</div><div class="hss">🏆 '+s.winner+' · '+s.totalGoals+' голів</div></div>'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<button onclick="event.stopPropagation();delH('+i+')" style="background:transparent;border:none;color:#e06060;cursor:pointer;font-size:16px;padding:4px">🗑</button>'
      +'<span style="color:var(--mt);font-size:18px" id="ha'+i+'">▼</span></div></div>'
      +'<div class="hsbody" id="hb'+i+'">'
      +'<div class="hpod"><span class="pi p1">🥇 '+(s.podium[0]||'')+'</span><span class="pi p2">🥈 '+(s.podium[1]||'-')+'</span><span class="pi p3">🥉 '+(s.podium[2]||'-')+'</span></div>'
      +(s.relegated&&s.relegated.length?'<div style="font-size:12px;color:#e06060;margin-bottom:4px">⬇ Вилетіли: '+s.relegated.join(', ')+'</div>':'')
      +(s.promoted&&s.promoted.filter(Boolean).length?'<div style="font-size:12px;color:#4cde7a;margin-bottom:8px">⬆ Підвищились: '+s.promoted.filter(Boolean).join(', ')+'</div>':'')
      +'<table style="font-size:12px"><thead><tr><th>#</th><th>Команда</th><th>І</th><th>В</th><th>Н</th><th>П</th><th>ГЗ</th><th>ГП</th><th>О</th></tr></thead><tbody>'
      +s.table.map(function(t,j){return '<tr><td>'+(j+1)+'</td><td style="text-align:left">'+t.n+'</td><td>'+t.played+'</td><td>'+t.won+'</td><td>'+t.drawn+'</td><td>'+t.lost+'</td><td>'+t.gf+'</td><td>'+t.ga+'</td><td style="color:var(--y);font-weight:700">'+t.pts+'</td></tr>';}).join('')
      +'</tbody></table></div></div>';
  }).join('');
}
function togH(i){var b=document.getElementById('hb'+i),a=document.getElementById('ha'+i);b.classList.toggle('open');a.textContent=b.classList.contains('open')?'▲':'▼';}
function delH(i){if(!confirm('Видалити цей сезон?'))return;history.splice(i,1);saveHistory();renderHistory();}
function delAllHist(){if(!confirm('Видалити весь архів?'))return;history=[];saveHistory();renderHistory();}
function resetCampaign(){
  if(!confirm('Нова кампанія? Весь прогрес буде видалено.'))return;
  history=[];season=1;lastSorted=[];
  PL=BASE_PL.map(function(t){return mkTeam(t);});
  FL=BASE_FL.map(function(t){return mkTeam(t);});
  localStorage.removeItem(KEY_STATE);
  localStorage.removeItem(KEY_HISTORY);
  buildSetupGrid();showPhase('ph-setup');
}
function restartSeason(){if(!confirm('Скинути поточний сезон?'))return;buildSetupGrid();showPhase('ph-setup');}

// ── PHASE ─────────────────────────────────────────────────────────────────
var curPhase='ph-setup';
function showPhase(id){
  ['ph-setup','ph-season','ph-final','ph-hist'].forEach(function(p){document.getElementById(p).classList.toggle('hidden',p!==id);});
  curPhase=id;
  var hb=document.getElementById('hbtns');
  if(id==='ph-season')hb.innerHTML='<button class="btn btnS btnSm" onclick="showHistory()">📋 Архів</button><button class="btnR" onclick="restartSeason()">↺ Скинути</button>';
  else if(id==='ph-setup'||id==='ph-final')hb.innerHTML='<button class="btn btnS btnSm" onclick="showHistory()">📋 Архів</button>';
  else hb.innerHTML='';
}

// ── INIT ──────────────────────────────────────────────────────────────────
// loadState() already ran above — PL/FL/season are restored if save existed
buildSetupGrid();
showPhase('ph-setup');
</script>
